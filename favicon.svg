<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="#0a0a0a"/>
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Wave / sushi rice shape -->
  <ellipse cx="50" cy="62" rx="22" ry="10" fill="#c9a96e" opacity="0.9"/>
  <!-- Fish / topping arc -->
  <path d="M 28 54 Q 50 38 72 54" fill="#8a1a1a" stroke="none"/>
  <!-- Nori band -->
  <rect x="28" y="56" width="44" height="5" rx="2" fill="#1a1a1a"/>
  <!-- Kanji-style strokes forming K -->
  <line x1="36" y1="22" x2="36" y2="42" stroke="#c9a96e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="32" x2="48" y2="22" stroke="#c9a96e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="32" x2="48" y2="42" stroke="#c9a96e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Dot accents -->
  <circle cx="57" cy="28" r="2.5" fill="#c9a96e" opacity="0.6"/>
  <circle cx="64" cy="32" r="1.5" fill="#c9a96e" opacity="0.4"/>
</svg>
